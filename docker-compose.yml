version: '3.8'

services:
  # --- Service 1 : MongoDB ---
  mongo:
    image: mongo:7
    container_name: terrangafood-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # --- Service 2 : API Express ---
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: terrangafood-api
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/terrangafood
      - PORT=3001
    depends_on:
      - mongo
    restart: unless-stopped

  # --- Service 3 : Frontend Next.js ---
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    container_name: terrangafood-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

# --- Volumes persistants ---
volumes:
  mongo-data: